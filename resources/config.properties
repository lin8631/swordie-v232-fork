mob.meso.rate=10

# -------- 怪物经验倍率（MobExpConstants） --------
# 基础经验倍率（适用于等级>=10的怪物）
# 实际经验值 = 怪物基础经验 * 该倍率
mob.exp.base.rate=10
# 10级以上地图的额外经验倍率
mob.exp.rate.per.level.10=10

# -------- 自定义倍率（CustomConstants） --------
# 精英/强化怪物的 HP 倍率（相对于普通怪物）
# 例如: 1000 = 1000倍HP
custom.buffed.mob.hp.multiplier=1000
# 精英/强化怪物的 伤害倍率（相对于普通怪物）
# 例如: 10 = 10倍伤害
custom.buffed.mob.damage.multiplier=10

